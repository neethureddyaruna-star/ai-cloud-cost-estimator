apiVersion: apps/v1
kind: Deployment
metadata:
  name: cost-estimator-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: estimator
  template:
    metadata:
      labels:
        app: estimator
    spec:
      containers:
      - name: estimator-container
        image: cloud-cost-estimator
        ports:
        - containerPort: 5000
